{% extends "base.html" %}
{% block title %}My Profile{% endblock %}
{% block page_title %}My Profile{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card">
    <form method="POST" action="{{ url_for('profile') }}">

      <div class="form-section">
        <div class="form-section-title"><span class="section-num">01</span> Account Details</div>
        <div class="form-grid">
          <div class="form-group">
            <label>Username</label>
            <input type="text" value="{{ session.username }}" disabled class="input-disabled" />
          </div>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="full_name" value="{{ user.full_name or '' }}" placeholder="Your full name" />
          </div>
          <div class="form-group form-full">
            <label>Email</label>
            <input type="email" name="email" value="{{ user.email or '' }}" placeholder="admin@college.edu" />
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-title"><span class="section-num">02</span> Change Password</div>
        <div class="form-grid">
          <div class="form-group form-full">
            <label>New Password <span class="text-muted">(leave blank to keep current)</span></label>
            <input type="password" name="new_password" placeholder="Enter new password" autocomplete="new-password" />
          </div>
        </div>
      </div>

      <div class="form-actions">
        <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-accent">Update Profile</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
