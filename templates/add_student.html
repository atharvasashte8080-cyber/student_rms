{% extends "base.html" %}
{% block title %}Add Student{% endblock %}
{% block page_title %}Add New Student{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card">
    <form method="POST" action="{{ url_for('add_student') }}" novalidate>

      <!-- Section: Personal Info -->
      <div class="form-section">
        <div class="form-section-title">
          <span class="section-num">01</span> Personal Information
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>First Name <span class="req">*</span></label>
            <input type="text" name="first_name" placeholder="e.g. Shruti" required />
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" name="last_name" placeholder="e.g. Bhosale" />
          </div>
          <div class="form-group">
            <label>Roll Number <span class="req">*</span></label>
            <input type="text" name="roll_no" placeholder="e.g. 2024CS041" required />
          </div>
          <div class="form-group">
            <label>Gender</label>
            <select name="gender">
              <option value="">Select Gender</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" name="dob" />
          </div>
          <div class="form-group">
            <label>Admission Date</label>
            <input type="date" name="admission_date" />
          </div>
        </div>
      </div>

      <!-- Section: Academic Info -->
      <div class="form-section">
        <div class="form-section-title">
          <span class="section-num">02</span> Academic Details
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Department <span class="req">*</span></label>
            <input type="text" name="department" placeholder="e.g. Computer Science" required list="dept-list" />
            <datalist id="dept-list">
              <option value="Computer Science">
              <option value="Information Technology">
              <option value="BCA">
              <option value="Mathematics">
              <option value="Commerce">
            </datalist>
          </div>
          <div class="form-group">
            <label>Class / Section</label>
            <select name="class_id">
              <option value="">Select Class</option>
              {% for c in classes %}
              <option value="{{ c.id }}">{{ c.class_name }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
      </div>

      <!-- Section: Contact Info -->
      <div class="form-section">
        <div class="form-section-title">
          <span class="section-num">03</span> Contact Information
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="student@email.com" />
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="phone_no" placeholder="+91 XXXXX XXXXX" maxlength="15" />
          </div>
          <div class="form-group form-full">
            <label>Residential Address</label>
            <textarea name="address" rows="2" placeholder="Full residential address…"></textarea>
          </div>
        </div>
      </div>

      <!-- Section: Guardian Info -->
      <div class="form-section">
        <div class="form-section-title">
          <span class="section-num">04</span> Guardian / Parent Details
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Guardian Name</label>
            <input type="text" name="guardian_name" placeholder="Parent / Guardian name" />
          </div>
          <div class="form-group">
            <label>Guardian Contact</label>
            <input type="text" name="guardian_contact" placeholder="+91 XXXXX XXXXX" maxlength="15" />
          </div>
        </div>
      </div>

      <!-- Buttons -->
      <div class="form-actions">
        <a href="{{ url_for('view_students') }}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-accent">Save Student →</button>
      </div>

    </form>
  </div>
</div>
{% endblock %}
